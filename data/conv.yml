groups:
  mood: [sad, happy]
  energy: [tired, stressed, bored, excited]
  uncertainty: [unsure, stuck, motivated]

initial: [sayhi]
reset: [sayhi]

purposes:
  sayhi:
    templates:
      $:
        - "3* {Hiya/Heya/Hi/Hello}! How are you{ going/}?"
        - "3* {Hiya/Heya/Hi/Hello}! How{'s/ is} it going?"
        - "2* How{ are you/ is it/'s it}{ going/}?"
    options:
      - - ["Not the best", [sad], comfort]
        - ["Kinda stressed", [sad, stressed], comfort]
        - ["Ok", [], banter]
        - ["Pretty good", [happy], banter]
