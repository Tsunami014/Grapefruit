groups:
  mood: [sad, okay, happy]
  =project: "recomm_project"

initial: [checkup_mood]
reset: [checkup_mood]

purposes:
  checkup_mood:
    templates:
      mood:
        sad:
          - "I hope you {feel/start feeling} better soon."
          - "That sounds really tough."
        +:
          - "You seem to be doing well!"
        ~:
          - "How are you doing today?"
    options:
      - - ["A bit sad", [sad]]
        - ["Pretty good", [okay]]
        - ["Don't know", [-mood]]
