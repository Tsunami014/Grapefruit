groups:
  mood: [depressed, sad, happy]
  problem: [tired, stressed, bored, excited]
  uncertainty: [unsure, stuck, motivated]
  time: "time_of_day"

initial: [sayhi]
reset: [sayhi]

purposes:
  sayhi:
    # How is it going?
    - templates:
        "*":
          - "3* {$Hi/3*Good %time}! How{ are you/ is it/'s it} going?"
          - "2* How{ are you/ is it/'s it} going?"
          - "How's your {3*%time/day}{ going/ been/}?"
      opts:
        - ["Terribly", [depressed], checkin]
        - ["Not {the best/well/good/too good}", [sad], checkin]
        - ["{Ok/Alright/Meh}", [], checkin]
        - ["{Pretty good/Great/Good/Nice!}", [happy], progress]
    # What's up?
    - templates:
        "*":
          - "3* {$Hi/3*Good %time}! What's up?"
          - "{10*What's /Wass}up?"
      opts:
        - ["Going {well/good/great/pretty ok}", [happy], progress]
        - ["{Nothing/Not} much", [], suggest]
        - ["Not {well/the best/too good/too well}", [sad], checkin]
        - ["Going {poorly/terribly/awfully}", [depressed], checkin]
        - ["{Everything!/4*}", [], checkin]
        - ["{The sky/50*}", [], haha]

  haha:
    # Laugh at a joke
    - templates:
        "*":
          - "Ha{ha/ ha/}{! V/, v}ery funny{./!} $ButSeriously"
          - "Good one! $ButSeriously"
          - "Very funny{!/.} $ButSeriously"
      opts:
        - ["Not {doing well/going well/2*the best/at my best}", [sad], checkin]
        - ["{Pretty mid/2*Ok/2*Fine}", [], suggest]
        - ["{Going well/Going great/Well/Great/Awesome/Not bad}", [happy], progress]

  checkin:
    # Why are you sad?
    - templates:
        "sad?depressed":
          - "{What's/Anything} wrong?"
          - "Anything {troubling/bothering} you{right now/6*}?"
          - "2*{What's/Anything/What is} {the matter/on your mind}?"
        "depressed":
          - "What's {3*troubling/3*bothering/saddening} you?"
      shuffle: true
      opts:
        - ["{Tired/Everything's tiring}", [tired], comfort]
        - ["{Stressed/A bit stressed/Anxious/Life's stressful}", [stressed], comfort]
        - ["{Bored/Nothing to do}", [bored], suggest]
        - ["$Unsure", [unsure], suggest]
        - ["{Stuck/Need help}", [stuck], suggest]
        - ["{Nothing/Nothing's wrong/I'm good/All good/All's good}", [-mood, -uncertainty]]
    # How are you going?
    - templates:
        "=":
          - "2*How{ are you going/ is it going/ are things/'s it going/'s it coming along}?"
          - "How{'s/ is} life treating you{ this %time/today/3*}?"
          - "What's up?"
      shuffle: true
      opts:
        - ["{Not/Not going} good", [sad]]
        - ["{Stuck/Need help}", [stuck], encourage]
        - ["$Unsure", [unsure], suggest]
        - ["{Great/Awesome/Doing well/I've got this}!", [happy, motivated, -problem], progress]

  comfort:
    - templates:
        "*":
          - "I hope you get better soon"

  encourage:
    - templates:
        "*":
          - "Encouragement!"

  progress: # TODO: Become a reset option
    # How's your work coming along?
    - templates:
      "*":
        - "How are you going?"

  suggest:
    - templates:
        "*":
          - "What do you want to do next?"
          - "Maybe you can do xyz?"

dictionary:
  Hi: "Hiya/Heya/Hi/Hello/Hiii"
  ButSeriously: "But {really/seriously}, how are you{ going/ feeling/}{2*now/right now/3*}?"
  Unsure: "{Unsure/2*Aimless/2*Undecided/Lost}"
