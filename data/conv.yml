groups:
  mood: [depressed, sad, happy]
  problem: [tired, stressed, bored, excited]
  uncertainty: [unsure, stuck, motivated]
  time: "time_of_day"

initial: [sayhi]
reset: [sayhi]

purposes:
  sayhi:
    # How is it going?
    - templates:
        "*":
          - "2* {$Hi/2*Good %time}! How are you{ going/}?"
          - "2* {$Hi/Good %time}! How{'s/ is} it going?"
          - "2* How{ are you/ is it/'s it} going?"
          - "How is your {3*%time/day}{ going/ been/}?"
      opts:
        - ["Terribly", [depressed], checkin]
        - ["Not {the best/well/good}", [sad], checkin]
        - ["{Ok/Alright}", [], checkin]
        - ["{Pretty good/Good/Nice!}", [happy], banter]
    # What's up?
    - templates:
        "*":
          - "3* {$Hi/2*Good %time}! What's up?"
          - "What's up?"
      opts:
        - ["I'm going well", [happy], banter]
        - ["{Nothing/Not} much", [], checkin]
        - ["It's not going {well/the best}", [sad], checkin]
        - ["Things are going poorly", [depressed], checkin]
        - ["{Everything!//}", [], banter]

  checkin:
    # Why are you sad?
    - templates:
        "sad?depressed":
          - "What's {wrong/up}?"
          - "What's {troubling/bothering} you?"
          - "What's on your mind?"
      shuffle: true
      opts:
        - ["{I'm tired/Everything's tiring}", [tired], comfort]
        - ["I'm stressed", [stressed], comfort]
        - ["{I'm bored/Nothing to do/Bored}", [bored], suggest]
        - ["{I'm unsure what to do/I don't know what to do/I'm lost}", [unsure], suggest]
        - ["{I'm stuck/I need help}", [stuck], suggest]
    # How are you going?
    - templates:
        "=":
          - "How {are you going/is it going/are things}?"
      shuffle: true
      opts:
        - ["{I'm/It's} not going well", [sad]]
        - ["{I'm stuck/I need help}", [stuck], encourage]
        - ["{I'm unsure what to do/I don't know what to do/I'm lost}", [unsure], suggest]
        - ["{I'm doing well/I've got this}!", [happy, motivated, -problem], banter]

dictionary:
  Hi: "Hiya/Heya/Hi/Hello"
