groups:
  mood: [sad, okay, happy]
  energy: [tired, energized]
  social: [lonely, had_company]

initial: [sayhi]
reset: [sayhi]

purposes:
  sayhi:
    templates:
      =:
        - "Hello!"
      mood:
        sad:
          - "I hope you {feel/start feeling} better soon."
          - "That sounds really tough."
        +:
          - "You seem to be doing well!"
        ~:
          - "How are you doing today?"
    options:
      - - ["A bit sad", [sad]]
        - ["Pretty good", [okay]]
        - ["Don't know", [-mood]]
